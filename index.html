<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobbJägaren</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/2563eb/ffffff?text=JJ">
</head>
<body>
    <header>
        <h1>JobbJägaren 🚀</h1>
    </header>

    <main id="app">
        <section class="card">
            <h2>Mina Sökord</h2>
            <div class="input-group-row">
                <input type="text" id="new-keyword" placeholder="T.ex. AI, Utvecklare">
                <button onclick="addKeyword()" class="small-btn">Lägg till</button>
            </div>
            <div id="keyword-tags" class="tags-container"></div>
        </section>

        <section class="card">
            <h2>Område</h2>
            <select id="location-select" onchange="saveLocation()">
                <option value="Stockholms län">Stockholms län</option>
                <option value="Uppsala län">Uppsala län</option>
                <option value="Västra Götalands län">Västra Götalands län</option>
                <option value="Skåne län">Skåne län</option>
                <option value="Östergötlands län">Östergötlands län</option>
                <option value="Hela Sverige">Hela Sverige</option>
            </select>
        </section>

        <section class="card">
            <h2>Hitta Jobb</h2>
            <button onclick="searchLinkedIn()" class="linkedin-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                Sök på LinkedIn
            </button>
            <button onclick="searchAF()" id="af-btn" class="af-button">Hitta annonser via AF</button>
            <div id="af-results" class="results-list"></div>
        </section>

        <section class="card">
            <h2>Logga sökt jobb</h2>
            <input type="text" id="log-company" placeholder="Företag">
            <input type="text" id="log-role" placeholder="Roll">
            <button onclick="addJobLog()" class="save-btn">Spara i listan</button>
            <ul id="job-list" class="log-list"></ul>
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
